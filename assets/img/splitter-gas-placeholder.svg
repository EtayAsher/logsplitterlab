<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 220" width="320" height="220" role="img" aria-hidden="true">
  <defs>
    <style>
      .bg{fill:#f5f0e8;}
      .frame{fill:none;stroke:#1a3a2a;stroke-width:5;stroke-linecap:round;stroke-linejoin:round;}
      .accent{fill:#c17f24;}
      .accent-line{fill:none;stroke:#c17f24;stroke-width:5;stroke-linecap:round;}
      .wood{fill:#efe8da;stroke:#8B4513;stroke-width:3;}
      .wheel{fill:#1a3a2a;}
      .wheel-hub{fill:#f5f0e8;}
    </style>
  </defs>
  <rect class="bg" width="320" height="220" rx="12"/>

  <!-- ground line -->
  <line x1="24" y1="176" x2="296" y2="176" stroke="#e0d8c8" stroke-width="3"/>

  <!-- beam -->
  <rect class="frame" x="60" y="118" width="190" height="22" rx="4"/>

  <!-- engine block (gas) -->
  <rect class="frame" x="46" y="86" width="46" height="46" rx="6"/>
  <circle class="accent" cx="69" cy="109" r="10"/>
  <path class="accent-line" d="M92 96 q16 -6 16 -22"/>

  <!-- wedge -->
  <path class="frame" d="M232 108 L262 129 L232 150 Z"/>

  <!-- log -->
  <circle class="wood" cx="180" cy="129" r="26"/>
  <circle class="wood" cx="180" cy="129" r="11" fill="none" stroke="#8B4513" stroke-width="2"/>

  <!-- wheels -->
  <circle class="wheel" cx="98" cy="168" r="16"/>
  <circle class="wheel-hub" cx="98" cy="168" r="5"/>
  <circle class="wheel" cx="206" cy="168" r="16"/>
  <circle class="wheel-hub" cx="206" cy="168" r="5"/>

  <!-- legs -->
  <line class="frame" x1="250" y1="140" x2="258" y2="168" stroke-width="4"/>
</svg>
